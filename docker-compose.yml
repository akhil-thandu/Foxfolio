version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: foxfolio_postgres
    environment:
      POSTGRES_DB: foxfolio_dev
      POSTGRES_USER: foxfolio
      POSTGRES_PASSWORD: foxfolio_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: foxfolio_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
